; LilyGo T5S3-4.7-e-paper-PRO (ESP32-S3) E-Reader Firmware
; Display: ED047TC1 4.7" 960x540 via TPS65185 PMIC, driven by vroland/epdiy

[env:default]
platform = espressif32@6.4.0
board = lilygo_t5s3_pro
framework = arduino

extra_scripts = pre:tools/patch_epdiy.py

board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_size = 16MB
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
board_build.partitions = partitions.csv

monitor_speed = 115200
upload_speed = 460800
monitor_filters = esp32_exception_decoder, time

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCONFIG_SPIRAM_MODE_OCT=1
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_LOOP_STACK_SIZE=16384

lib_deps =
    https://github.com/vroland/epdiy.git#2.0.0
    lewisxhe/SensorLib@^0.2.0
    bblanchon/ArduinoJson@^6
    https://github.com/bitbank2/JPEGDEC.git
    https://github.com/bitbank2/PNGdec.git
    https://github.com/leethomason/tinyxml2.git#10.0.0
    ricmoo/QRCode@^0.0.1

lib_ldf_mode = deep+

[env:gh_release]
extends = env:default
# Release build: drop verbose ESP-IDF logging (errors only) for less serial
# noise and a small reduction in main-loop overhead.
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCONFIG_SPIRAM_MODE_OCT=1
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_LOOP_STACK_SIZE=16384
    -DFIRMWARE_VERSION='"${sysenv.RELEASE_TAG}"'
